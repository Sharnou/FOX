// DO NOT EDIT THIS FILE! IT IS GENERATED EACH TIME "npx cap sync" IS RUN

// Capacitor 8.x: delegate to npm package settings file.
// Use settingsDir (absolute) for robustness — relative paths fail in some Gradle versions.
def capacitorAndroidSettingsFile = new File(settingsDir, '../node_modules/@capacitor/android/capacitor-android.settings.gradle')
if (capacitorAndroidSettingsFile.exists()) {
    apply from: capacitorAndroidSettingsFile
} else {
    // Fallback: manually include :capacitor-android when the npm package file is absent
    // (e.g. before 'npm install' has been run, or on a clean CI checkout).
    include ':capacitor-android'
    project(':capacitor-android').projectDir = new File(settingsDir, '../node_modules/@capacitor/android/capacitor')
}

include ':capacitor-push-notifications'
project(':capacitor-push-notifications').projectDir = new File(settingsDir, '../node_modules/@capacitor/push-notifications/android')

include ':capacitor-local-notifications'
project(':capacitor-local-notifications').projectDir = new File(settingsDir, '../node_modules/@capacitor/local-notifications/android')
