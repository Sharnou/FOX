<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- OFFICIAL XTOX ICON — DO NOT CHANGE -->
  <rect width="100" height="100" fill="white" rx="10"/>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="50%" style="stop-color:#888"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  <!-- Left arm of X -->
  <polygon points="10,10 28,10 50,45 28,80 10,80 32,45" fill="url(#g1)"/>
  <!-- Right arm of X -->
  <polygon points="90,10 72,10 50,45 72,80 90,80 68,45" fill="#333"/>
  <!-- Center top chevron -->
  <polygon points="38,10 50,10 62,10 50,38" fill="#666"/>
  <!-- Center bottom chevron -->
  <polygon points="38,80 50,80 62,80 50,62" fill="#666"/>
  <!-- XtoX text -->
  <text x="50" y="96" font-family="Arial Black,sans-serif" font-size="14" font-weight="900" text-anchor="middle" fill="#111">XtoX</text>
</svg>
