<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XTOX - غير متصل بالإنترنت</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cairo', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 40%, #4c1d95 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 420px;
      width: 100%;
    }

    .logo {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(90deg, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .icon {
      font-size: 5rem;
      margin: 24px 0;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(0.95); }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #e9d5ff;
    }

    p {
      font-size: 1rem;
      color: #c4b5fd;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
    }

    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(124, 58, 237, 0.5);
    }

    .retry-btn:active {
      transform: translateY(0);
    }

    .tips {
      margin-top: 36px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 12px;
      border: 1px solid rgba(167, 139, 250, 0.2);
    }

    .tips h3 {
      font-size: 0.85rem;
      color: #a78bfa;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .tips ul {
      list-style: none;
      font-size: 0.85rem;
      color: #c4b5fd;
      line-height: 2;
    }

    .tips ul li::before {
      content: '• ';
      color: #7c3aed;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">XTOX</div>

    <div class="icon">📡</div>

    <h1>أنت غير متصل بالإنترنت</h1>
    <p>
      تعذّر تحميل الصفحة.<br />
      يرجى التحقق من اتصالك بالإنترنت والمحاولة مجدداً.
    </p>

    <button class="retry-btn" onclick="window.location.reload()">
      🔄 إعادة المحاولة
    </button>

    <div class="tips">
      <h3>نصائح للاتصال</h3>
      <ul>
        <li>تحقق من اتصال Wi-Fi أو البيانات</li>
        <li>أعِد تشغيل الراوتر إن لزم الأمر</li>
        <li>تأكد من وجود إشارة قوية</li>
      </ul>
    </div>
  </div>
</body>
</html>
